{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monitor Financeiro{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --app-bg: #f4efe7;
            --app-text: #172033;
            --app-muted: #5c667f;
            --app-accent: #1f5cff;
            --app-accent-2: #ff7a18;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--app-text);
            background:
                radial-gradient(circle at top left, rgba(31, 92, 255, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(255, 122, 24, 0.14), transparent 24%),
                linear-gradient(180deg, #faf7f1 0%, #f4efe7 100%);
            min-height: 100vh;
        }

        a { color: inherit; }
        .app-shell { max-width: 1200px; }
        .glass {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(23, 32, 51, 0.12);
            box-shadow: 0 24px 60px rgba(23, 32, 51, 0.12);
        }
        .soft-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--app-muted);
        }
        .hero-title { letter-spacing: -0.04em; }
        .hero-subtitle { color: var(--app-muted); line-height: 1.7; }
        .fade-in { animation: fadeIn 520ms ease both; }
        .surface { border-radius: 2rem; }
        .text-app-muted { color: var(--app-muted) !important; }
        .text-app-accent { color: var(--app-accent) !important; }
        .bg-app-accent { background-color: var(--app-accent) !important; }
        .border-app-accent { border-color: var(--app-accent) !important; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container py-4 py-lg-5 app-shell">
        {% block body %}{% endblock %}
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
